name: animated_splash_themes
description: >-
  Richly animated Flutter splash screens with 4 built-in styles: Particles, Neon,
  Grid, and Bounce. Supports random style selection, custom colors, and configurable
  display duration.
version: 1.0.1
repository: https://github.com/piro-hiroki/animated_splash_themes
issue_tracker: https://github.com/piro-hiroki/animated_splash_themes/issues

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
